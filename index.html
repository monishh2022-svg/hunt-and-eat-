<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>

<!-- Firebase (only used if you paste your config below) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
/* =====================================================================
   STEP 1 (OPTIONAL BUT RECOMMENDED): PASTE YOUR FIREBASE CONFIG HERE
   ---------------------------------------------------------------------
   Get it free at https://console.firebase.google.com
   (Create project -> Firestore Database -> Project settings -> Web app)
   It looks like:  { apiKey: "...", authDomain: "...", projectId: "..." }
   With Firebase: customer orders sync to the admin panel automatically.
   Without it (null): DEMO MODE — data saves only on each visitor's own
   device, and customer orders reach you via the WhatsApp button instead.
===================================================================== */
const FIREBASE_CONFIG = null;

/* ============ PLAN B: REALTIME DATABASE (always free) ============
   If Firestore asks for billing, use Firebase "Realtime Database"
   instead. Create it (Build -> Realtime Database), copy its URL
   (looks like https://hunt-and-eat-default-rtdb.asia-southeast1.firebasedatabase.app)
   and paste it between the quotes below. Leave FIREBASE_CONFIG = null.
================================================================== */
const FIREBASE_RTDB_URL = "https://hunt-and-eat-default-rtdb.asia-southeast1.firebasedatabase.app"; // e.g. "https://hunt-and-eat-default-rtdb.asia-southeast1.firebasedatabase.app"


let __db = null;
if (FIREBASE_CONFIG) {
  firebase.initializeApp(FIREBASE_CONFIG);
  __db = firebase.firestore();
}
/* storage shim — if a native storage API already exists (e.g. Claude preview),
   keep it; otherwise use Firebase or this browser's local storage */
function __rtdbUrl(key) {
  return FIREBASE_RTDB_URL.replace(/\/+$/, "") + "/huntandeat/" + encodeURIComponent(key) + ".json";
}
window.storage = (window.storage && window.storage.get) ? window.storage :
FIREBASE_RTDB_URL ? {
  async get(key, shared) {
    const r = await fetch(__rtdbUrl(key));
    const v = await r.json();
    return v == null ? null : { key, value: v, shared: true };
  },
  async set(key, value, shared) {
    await fetch(__rtdbUrl(key), { method: "PUT", body: JSON.stringify(value) });
    return { key, value, shared: true };
  },
  async delete(key) {
    await fetch(__rtdbUrl(key), { method: "DELETE" });
    return { key, deleted: true };
  },
  async list() { return { keys: [] }; },
} : {
  async get(key, shared) {
    if (__db) {
      const d = await __db.collection("huntandeat").doc(key).get();
      return d.exists ? { key, value: d.data().v, shared: true } : null;
    }
    const v = localStorage.getItem("he-" + key);
    return v == null ? null : { key, value: v, shared: false };
  },
  async set(key, value, shared) {
    if (__db) { await __db.collection("huntandeat").doc(key).set({ v: value }); }
    else { localStorage.setItem("he-" + key, value); }
    return { key, value, shared: !!shared };
  },
  async delete(key) {
    if (__db) { await __db.collection("huntandeat").doc(key).delete(); }
    else { localStorage.removeItem("he-" + key); }
    return { key, deleted: true };
  },
  async list() { return { keys: [] }; },
};
</script>

function ProductImage({ p, height = 120, fontSize = 52 }) {
  return (
    <div style={{ background: "linear-gradient(135deg,#FAF1E2,#F3DFC8)", height, display: "grid", placeItems: "center", fontSize, position: "relative", overflow: "hidden" }}>
      <div style={{ position: "absolute", right: -8, bottom: -10, opacity: 0.13 }}><Logo size={Math.round(height * 0.95)} /></div>
      <span style={{ position: "relative" }}>{p.emoji}</span>
      {imgOf(p) && (
        <img src={imgOf(p)} alt={p.name} loading="lazy"
          onError={(e) => { e.currentTarget.style.display = "none"; }}
          style={{ position: "absolute", inset: 0, width: "100%", height: "100%", objectFit: "cover" }} />
      )}
    </div>
  );
}

function nextDays(n) {
  const out = [];
  for (let i = 0; i < n; i++) {
    const d = new Date();
    d.setDate(d.getDate() + i);
    out.push({
      key: d.toISOString().slice(0, 10),
      label: i === 0 ? "Today" : i === 1 ? "Tomorrow" : d.toLocaleDateString("en-IN", { weekday: "short" }),
      sub: d.toLocaleDateString("en-IN", { day: "numeric", month: "short" }),
    });
  }
  return out;
}

/* ---------------- storage (SHARED: one store, all visitors see the same
   catalog & settings; orders flow to the separate admin dashboard) -------- */
async function loadKey(key, fallback) {
  try {
    const r = await window.storage.get(key, true);
    return r ? JSON.parse(r.value) : fallback;
  } catch {
    return fallback;
  }
}
async function saveKey(key, val) {
  try {
    await window.storage.set(key, JSON.stringify(val), true);
  } catch (e) {
    console.error("save failed", key, e);
  }
}

  const [orders, setOrders] = useState([]);
  const [loaded, setLoaded] = useState(false);

  useEffect(() => {
    (async () => {
      const data = await loadKey("huntandeat-core-v2", null);
      if (data) {
        setProducts(data.products || DEFAULT_PRODUCTS);
        setSlots(data.slots || DEFAULT_SLOTS);
        setSettings({ ...DEFAULT_SETTINGS, ...(data.settings || {}) });
      } else {
        // first run: publish the default catalog so the admin app sees it too
        saveKey("huntandeat-core-v2", { products: DEFAULT_PRODUCTS, slots: DEFAULT_SLOTS, settings: DEFAULT_SETTINGS });
      }
      const ord = await loadKey("huntandeat-orders", []);
      setOrders(ord);
      setLoaded(true);
    })();
  }, []);

  // customer app only ever APPENDS orders — it never edits catalog/settings
  const placeOrder = async (o) => {
    const latest = await loadKey("huntandeat-orders", []);
    const next = [o, ...latest];
    setOrders(next);
    await saveKey("huntandeat-orders", next);
  };

  if (!loaded) {
    return (
      <div style={{ minHeight: "100vh", display: "grid", placeItems: "center", background: BRAND.cream, fontFamily: "'Nunito',sans-serif" }}>
        <div style={{ textAlign: "center" }}><Logo size={60} /><div style={{ fontWeight: 700, color: BRAND.green, marginTop: 8 }}>Loading fresh stock…</div></div>
      </div>
    );
  }

  return (
    <div style={{ minHeight: "100vh", background: BRAND.cream, fontFamily: "'Nunito','Segoe UI',system-ui,sans-serif", color: BRAND.ink }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@400;600;700;800&family=Caveat:wght@600;700&display=swap');
        .display { font-family: 'Baloo 2', 'Trebuchet MS', sans-serif; }
        .script { font-family: 'Caveat', cursive; }
        * { -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { height: 6px; width: 8px; }
        ::-webkit-scrollbar-thumb { background: #d8d2c4; border-radius: 4px; }
        .fadeup { animation: fadeup .35s ease both; }
        @keyframes fadeup { from { opacity: 0; transform: translateY(8px);} to { opacity: 1; transform: none; } }
        @media (prefers-reduced-motion: reduce) { .fadeup { animation: none; } }
      `}</style>
      <Shop products={products} slots={slots} settings={settings} orders={orders} onPlaceOrder={placeOrder} />
    </div>
  );
}

/* ================================ SHOP ================================ */
function Shop({ products, slots, settings, orders, onPlaceOrder }) {
  const [cat, setCat] = useState("all");
  const [search, setSearch] = useState("");
  const [cart, setCart] = useState({}); // id -> qty
  const [cartOpen, setCartOpen] = useState(false);
  const [checkout, setCheckout] = useState(false);
  const [placed, setPlaced] = useState(null);
  const [trackOpen, setTrackOpen] = useState(false);
  const [detail, setDetail] = useState(null);

  const visible = products.filter((p) =>
    (cat === "all" || p.cat === cat) &&
    p.name.toLowerCase().includes(search.toLowerCase())

  const cartItems = Object.entries(cart)
    .map(([id, qty]) => ({ p: products.find((x) => x.id === id), qty }))
    .filter((x) => x.p && x.qty > 0);
  const subtotal = cartItems.reduce((s, x) => s + x.p.price * x.qty, 0);
  const savings = cartItems.reduce((s, x) => s + (x.p.mrp - x.p.price) * x.qty, 0);
  const delFee = subtotal >= settings.freeAbove || subtotal === 0 ? 0 : settings.deliveryFee;
  const total = subtotal + delFee;

    const q = Math.max(0, (c[id] || 0) + d);
    const n = { ...c, [id]: q };

    return n;

    <div>

          done={(order) => { onPlaceOrder(order); setCart({}); setCheckout(false); setPlaced(order); }} />

  );
}

/* ---------------- checkout ---------------- */
function Checkout({ cartItems, subtotal, delFee, total, slots, settings, orders, back, done }) {
  const days = nextDays(3);
  const [day, setDay] = useState(days[0].key);
  const [slotId, setSlotId] = useState(null);
  const [form, setForm] = useState({ name: "", phone: "", address: "", pincode: "", pay: "cod" });
  const [err, setErr] = useState("");
  const [locBusy, setLocBusy] = useState(false);

  const captureLoc = () => {
    if (!navigator.geolocation) return setErr("GPS not supported on this device — you can continue without it.");
    setLocBusy(true);
    navigator.geolocation.getCurrentPosition(
      (pos) => { setForm((f) => ({ ...f, loc: { lat: +pos.coords.latitude.toFixed(6), lng: +pos.coords.longitude.toFixed(6) } })); setLocBusy(false); setErr(""); },
      () => { setLocBusy(false); setErr("Couldn't get GPS — allow location access in your browser, or continue without it."); },
      { enableHighAccuracy: true, timeout: 9000 }
    );
  };

  const now = new Date();
  const slotState = (s) => {
    if (!s.active) return { ok: false, why: "Unavailable" };
    if (day === days[0].key && now.getHours() >= s.start - settings.cutoffHours) return { ok: false, why: "Cut-off passed" };
    const booked = orders.filter((o) => o.slotDate === day && o.slotId === s.id && o.status !== "Cancelled").length;
    if (booked >= s.capacity) return { ok: false, why: "Slot full" };
    return { ok: true, left: s.capacity - booked };
  };

  const place = () => {
    if (!form.name.trim() || !/^\d{10}$/.test(form.phone.replace(/\D/g, "").slice(-10)) || !form.address.trim() || !form.pincode.trim())
      return setErr("Please fill name, a valid 10-digit phone, address and pincode.");
    const serviceable = settings.pincodes.split(",").map((x) => x.trim());
    if (!serviceable.includes(form.pincode.trim()))
      return setErr(`Sorry, we don't deliver to ${form.pincode} yet. We serve: ${settings.pincodes}`);
    if (!slotId) return setErr("Please pick a delivery slot.");
    const slot = slots.find((s) => s.id === slotId);
    const id = "HE" + Date.now().toString().slice(-6);
    done({
      id, items: cartItems.map(({ p, qty }) => ({ name: p.name, qty, price: p.price })),
      subtotal, delFee, total, ...form,
      slotDate: day, slotId, slotLabel: slot.label,
      status: "Order received", placedAt: new Date().toISOString(),
    });
  };

  return (
    <Drawer title="Checkout" close={back} backLabel="← Basket">
      <SectionLabel n="1" t="Delivery slot" />
      <div style={{ display: "flex", gap: 8, marginBottom: 10 }}>
        {days.map((d) => (
          <button key={d.key} onClick={() => { setDay(d.key); setSlotId(null); }}
            style={{ flex: 1, border: "2px solid " + (day === d.key ? BRAND.green : "#e5dfd0"), background: day === d.key ? BRAND.green : "#fff", color: day === d.key ? "#fff" : BRAND.ink, borderRadius: 10, padding: "8px 4px", cursor: "pointer", fontWeight: 700, fontSize: 13 }}>
            {d.label}<div style={{ fontSize: 11, fontWeight: 500, opacity: 0.8 }}>{d.sub}</div>
          </button>
        ))}
      </div>
      <div style={{ display: "grid", gap: 8, marginBottom: 18 }}>
        {slots.map((s) => {
          const st = slotState(s);
          const sel = slotId === s.id;
          return (
            <button key={s.id} disabled={!st.ok} onClick={() => setSlotId(s.id)}
              style={{ display: "flex", justifyContent: "space-between", alignItems: "center", border: "2px solid " + (sel ? BRAND.green : "#e5dfd0"), background: sel ? "#FCEFEA" : st.ok ? "#fff" : "#f3f0e8", borderRadius: 10, padding: "10px 14px", cursor: st.ok ? "pointer" : "not-allowed", fontSize: 14, fontWeight: 600, color: st.ok ? BRAND.ink : "#a39e93" }}>
              <span>🕐 {s.label}</span>
              <span style={{ fontSize: 12, fontWeight: 600 }}>{st.ok ? (st.left <= 5 ? `${st.left} left` : "Available") : st.why}</span>
            </button>
          );
        })}
      </div>

      <SectionLabel n="2" t="Delivery details" />
      <div style={{ display: "grid", gap: 8, marginBottom: 18 }}>
        <input placeholder="Full name" value={form.name} onChange={(e) => setForm({ ...form, name: e.target.value })} style={inp} />
        <input placeholder="Phone (10 digits)" value={form.phone} onChange={(e) => setForm({ ...form, phone: e.target.value })} style={inp} />
        <textarea placeholder="Full address — flat, block, apartment, street" rows={2} value={form.address} onChange={(e) => setForm({ ...form, address: e.target.value })} style={{ ...inp, resize: "vertical" }} />
        <input placeholder="Pincode" value={form.pincode} onChange={(e) => setForm({ ...form, pincode: e.target.value })} style={inp} />
        <button onClick={captureLoc} type="button"
          style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 8, border: "2px dashed " + (form.loc ? "#177245" : BRAND.green), background: form.loc ? "#EAF6EE" : "#FDF7F1", color: form.loc ? "#177245" : BRAND.green, borderRadius: 10, padding: "11px 14px", fontWeight: 700, fontSize: 13, cursor: "pointer" }}>
          📍 {locBusy ? "Getting your location…" : form.loc ? "Location captured ✓ — helps our rider find you" : "Share exact GPS location (optional)"}
        </button>
      </div>

      <SectionLabel n="3" t="Payment" />
      <div style={{ display: "grid", gap: 8, marginBottom: 16 }}>
        {[["cod", "💵 Cash on delivery"], ["upi", "📱 UPI on delivery (GPay / PhonePe)"]].map(([v, l]) => (
          <label key={v} style={{ display: "flex", gap: 10, alignItems: "center", border: "2px solid " + (form.pay === v ? BRAND.green : "#e5dfd0"), borderRadius: 10, padding: "10px 14px", cursor: "pointer", fontSize: 14, fontWeight: 600, background: form.pay === v ? "#eef5f0" : "#fff" }}>
            <input type="radio" checked={form.pay === v} onChange={() => setForm({ ...form, pay: v })} />{l}
          </label>
        ))}
      </div>

      <div style={{ background: "#faf7f0", borderRadius: 10, padding: "10px 14px", fontSize: 14, marginBottom: 14 }}>
        <Row l="Item total" r={rup(subtotal)} />
        <Row l="Delivery" r={delFee === 0 ? "FREE" : rup(delFee)} green={delFee === 0} />
        <Row l={<b>To pay</b>} r={<b>{rup(total)}</b>} />
      </div>
      {err && <div style={{ color: BRAND.red, fontSize: 13, marginBottom: 10, fontWeight: 600 }}>{err}</div>}
      <button onClick={place} style={{ width: "100%", background: BRAND.green, color: "#fff", border: "none", borderRadius: 12, padding: 14, fontWeight: 800, fontSize: 15, cursor: "pointer" }}>
        Place order — {rup(total)}
      </button>
    </Drawer>
  );
}
const inp = { padding: "11px 14px", borderRadius: 10, border: "1.5px solid #e5dfd0", fontSize: 14, outline: "none", fontFamily: "inherit", boxSizing: "border-box", width: "100%" };
const SectionLabel = ({ n, t }) => (
  <div style={{ display: "flex", gap: 8, alignItems: "center", margin: "0 0 10px" }}>
    <span style={{ background: BRAND.green, color: "#fff", width: 22, height: 22, borderRadius: 999, display: "grid", placeItems: "center", fontSize: 12, fontWeight: 800 }}>{n}</span>
    <span className="display" style={{ fontWeight: 800, fontSize: 16 }}>{t}</span>
  </div>
);

function Success({ order, settings, close }) {
  const waNumber = (settings?.phone || "").replace(/\D/g, "").slice(-10);
  const waText = encodeURIComponent(
    `🐓 *Hunt & Eat — New Order ${order.id}*\n` +
    order.items.map((i) => `• ${i.name} ×${i.qty} — ${rup(i.price * i.qty)}`).join("\n") +
    `\nTotal: *${rup(order.total)}* (${order.pay === "cod" ? "COD" : "UPI on delivery"})` +
    `\nSlot: ${order.slotDate} · ${order.slotLabel}` +
    `\nName: ${order.name} · 📞 ${order.phone}` +
    `\nAddress: ${order.address}, ${order.pincode}`
  );
  return (
    <Modal close={close}>
      <div style={{ textAlign: "center" }}>
        <div style={{ fontSize: 56 }}>✅</div>
        <h3 className="display" style={{ fontWeight: 800, fontSize: 22, margin: "8px 0 4px" }}>Order placed!</h3>
        <div style={{ fontSize: 14, color: "#5c584e" }}>Order ID</div>
        <div className="display" style={{ fontSize: 26, fontWeight: 800, color: BRAND.green, letterSpacing: 1 }}>{order.id}</div>
        <div style={{ background: "#faf7f0", borderRadius: 10, padding: 12, margin: "14px 0", fontSize: 14, textAlign: "left" }}>
          <Row l="Slot" r={`${order.slotDate} · ${order.slotLabel}`} />
          <Row l="Payment" r={order.pay === "cod" ? "Cash on delivery" : "UPI on delivery"} />
          <Row l={<b>To pay</b>} r={<b>{rup(order.total)}</b>} />
        </div>
        <a href={`https://wa.me/91${waNumber}?text=${waText}`} target="_blank" rel="noreferrer"
          style={{ display: "block", background: "#1FA855", color: "#fff", borderRadius: 12, padding: 13, fontWeight: 700, fontSize: 15, textDecoration: "none", marginBottom: 10 }}>
          📲 Confirm on WhatsApp
        </a>
        <p style={{ fontSize: 12, color: "#8a857a", margin: "0 0 10px" }}>Tap above to send your order to our kitchen on WhatsApp — this confirms it fastest.</p>
        <button onClick={close} style={{ width: "100%", background: BRAND.green, color: "#fff", border: "none", borderRadius: 12, padding: 13, fontWeight: 700, fontSize: 15, cursor: "pointer" }}>Continue shopping</button>
      </div>
    </Modal>
  );
}

function Track({ orders, close }) {
  const [q, setQ] = useState("");
  const [found, setFound] = useState(null);
  const search = () => {
    const o = orders.find((x) => x.id.toLowerCase() === q.trim().toLowerCase() || x.phone.replace(/\D/g, "").endsWith(q.replace(/\D/g, "")) && q.trim().length >= 10);
    setFound(o || "none");
  };
  return (
    <Modal close={close}>
      <h3 className="display" style={{ fontWeight: 800, fontSize: 20, margin: "0 0 4px" }}>🔍 Freshness Tracker</h3>
      <p style={{ fontSize: 13, color: "#5c584e", margin: "0 0 12px" }}>Enter your order ID (e.g. HE123456) or phone number.</p>
      <div style={{ display: "flex", gap: 8 }}>
        <input value={q} onChange={(e) => setQ(e.target.value)} placeholder="Order ID or phone" style={{ ...inp, flex: 1 }} />
        <button onClick={search} style={{ background: BRAND.green, color: "#fff", border: "none", borderRadius: 10, padding: "0 18px", fontWeight: 700, cursor: "pointer" }}>Track</button>
      </div>
      {found === "none" && <div style={{ color: BRAND.red, fontSize: 13, marginTop: 10 }}>No order found. Check the ID and try again.</div>}
      {found && found !== "none" && (
        <div style={{ marginTop: 16 }}>
          <div style={{ fontWeight: 700, marginBottom: 10 }}>{found.id} · {rup(found.total)} · {found.slotLabel}</div>
          {found.status === "Cancelled" ? (
            <div style={{ color: BRAND.red, fontWeight: 700 }}>This order was cancelled.</div>
          ) : STATUSES.map((s, i) => {
            const idx = STATUSES.indexOf(found.status);
            const on = i <= idx;
            return (
              <div key={s} style={{ display: "flex", gap: 10, alignItems: "center", padding: "6px 0" }}>
                <span style={{ width: 22, height: 22, borderRadius: 999, background: on ? BRAND.green : "#e5dfd0", color: "#fff", display: "grid", placeItems: "center", fontSize: 12 }}>{on ? "✓" : ""}</span>
                <span style={{ fontWeight: on ? 700 : 500, color: on ? BRAND.ink : "#a39e93" }}>{["📋", "🔪", "📦", "🛵", "🏠"][i]} {s}</span>
              </div>
            );
          })}
        </div>
      )}
    </Modal>
  );
}

/* ---------------- shared UI ---------------- */
function Drawer({ title, close, backLabel, children }) {
  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(14,43,29,.5)", zIndex: 50, display: "flex", justifyContent: "flex-end" }} onClick={close}>
      <div onClick={(e) => e.stopPropagation()} style={{ background: "#fff", width: "min(440px,100%)", height: "100%", overflowY: "auto", padding: 20, boxSizing: "border-box" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
          <h3 className="display" style={{ margin: 0, fontWeight: 800, fontSize: 20 }}>{title}</h3>
          <button onClick={close} style={{ background: "#f0ece1", border: "none", borderRadius: 8, padding: "6px 12px", cursor: "pointer", fontWeight: 700, fontSize: 13 }}>{backLabel || "✕ Close"}</button>
        </div>
        {children}
      </div>
    </div>
  );
}
function Modal({ close, children }) {
  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(14,43,29,.5)", zIndex: 60, display: "grid", placeItems: "center", padding: 16 }} onClick={close}>
      <div onClick={(e) => e.stopPropagation()} style={{ background: "#fff", borderRadius: 16, width: "min(420px,100%)", maxHeight: "90vh", overflowY: "auto", padding: 20, boxSizing: "border-box", position: "relative" }}>
        <button onClick={close} style={{ position: "absolute", top: 10, right: 10, background: "#f0ece1", border: "none", borderRadius: 999, width: 30, height: 30, cursor: "pointer", fontWeight: 700 }}>✕</button>
        {children}
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
