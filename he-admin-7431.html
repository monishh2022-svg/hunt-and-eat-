<script>
/* =====================================================================
   STEP 1 (OPTIONAL BUT RECOMMENDED): PASTE YOUR FIREBASE CONFIG HERE
   ---------------------------------------------------------------------
   Get it free at https://console.firebase.google.com
   (Create project -> Firestore Database -> Project settings -> Web app)
   It looks like:  { apiKey: "...", authDomain: "...", projectId: "..." }
   With Firebase: customer orders sync to the admin panel automatically.
   Without it (null): DEMO MODE — data saves only on each visitor's own
   device, and customer orders reach you via the WhatsApp button instead.
===================================================================== */
const FIREBASE_CONFIG = null;

/* ============ PLAN B: REALTIME DATABASE (always free) ============
   If Firestore asks for billing, use Firebase "Realtime Database"
   instead. Create it (Build -> Realtime Database), copy its URL
   (looks like https://hunt-and-eat-default-rtdb.asia-southeast1.firebasedatabase.app)
   and paste it between the quotes below. Leave FIREBASE_CONFIG = null.
================================================================== */
const FIREBASE_RTDB_URL = null; // e.g. "https://hunt-and-eat-default-rtdb.asia-southeast1.firebasedatabase.app"


let __db = null;
if (FIREBASE_CONFIG) {
  firebase.initializeApp(FIREBASE_CONFIG);
  __db = firebase.firestore();
}
/* storage shim — if a native storage API already exists (e.g. Claude preview),
   keep it; otherwise use Firebase or this browser's local storage */
function __rtdbUrl(key) {
  return FIREBASE_RTDB_URL.replace(/\/+$/, "") + "/huntandeat/" + encodeURIComponent(key) + ".json";
}
window.storage = (window.storage && window.storage.get) ? window.storage :
FIREBASE_RTDB_URL ? {
  async get(key, shared) {
    const r = await fetch(__rtdbUrl(key));
    const v = await r.json();
    return v == null ? null : { key, value: v, shared: true };
  },
  async set(key, value, shared) {
    await fetch(__rtdbUrl(key), { method: "PUT", body: JSON.stringify(value) });
    return { key, value, shared: true };
  },
  async delete(key) {
    await fetch(__rtdbUrl(key), { method: "DELETE" });
    return { key, deleted: true };
  },
  async list() { return { keys: [] }; },
} : {
  async get(key, shared) {
    if (__db) {
      const d = await __db.collection("huntandeat").doc(key).get();
      return d.exists ? { key, value: d.data().v, shared: true } : null;
    }
    const v = localStorage.getItem("he-" + key);
    return v == null ? null : { key, value: v, shared: false };
  },
  async set(key, value, shared) {
    if (__db) { await __db.collection("huntandeat").doc(key).set({ v: value }); }
    else { localStorage.setItem("he-" + key, value); }
    return { key, value, shared: !!shared };
  },
  async delete(key) {
    if (__db) { await __db.collection("huntandeat").doc(key).delete(); }
    else { localStorage.removeItem("he-" + key); }
    return { key, deleted: true };
  },
  async list() { return { keys: [] }; },
};
</script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useRef } = React;


/* ============ HUNT & EAT — ADMIN DASHBOARD (separate app) ============
   • Auto-connects to the storefront: reads the same shared data
   • Auto-refreshes orders every 10 seconds
   • Menu editor with PHOTO UPLOAD (auto-compressed) or image URL
   • Keep this app's link private — customers only get the store link
===================================================================== */

const BRAND = {
  red: "#A6212E", redDark: "#7A1520", cream: "#FBF3E4", creamSoft: "#F6EADB",
  bg: "#F4F0E6", ink: "#241E1A", danger: "#8E1B25", ok: "#177245",
};

const CATEGORIES = [
  { id: "chicken", name: "Country Chicken" }, { id: "cuts", name: "Cuts & Boneless" },
  { id: "eggs", name: "Country Eggs" }, { id: "quail", name: "Quail & Kadaknath" },
  { id: "rtc", name: "Ready to Cook" }, { id: "combo", name: "Combos" },
];
const STATUSES = ["Order received", "Cutting & cleaning", "Packed", "Out for delivery", "Delivered"];
const rup = (n) => "₹" + Number(n).toLocaleString("en-IN");
const inp = { padding: "11px 14px", borderRadius: 10, border: "1.5px solid #e5dfd0", fontSize: 14, outline: "none", fontFamily: "inherit", boxSizing: "border-box", width: "100%" };

function Logo({ size = 44, color = BRAND.red }) {
  return (
    <svg width={size} height={size} viewBox="0 0 100 100" fill="none" aria-label="Hunt & Eat logo">
      <path d="M38 20 C72 14, 92 44, 74 78" stroke={color} strokeWidth="6" strokeLinecap="round" fill="none" />
      <path d="M39 21 L47 52 L73 77" stroke={color} strokeWidth="2.6" fill="none" />
      <path d="M22 60 L82 34" stroke={color} strokeWidth="6" strokeLinecap="round" />
      <path d="M82 34 L70 32 L76 42 Z" fill={color} />
      <g stroke={color} strokeWidth="4" strokeLinecap="round">
        <path d="M22 60 L12 54" /><path d="M22 60 L11 60" /><path d="M22 60 L13 67" />
      </g>
      <circle cx="34" cy="30" r="8.5" fill={color} />
      <path d="M27 24 q7 -6 14 -1" stroke={color} strokeWidth="4" fill="none" strokeLinecap="round" />
      <path d="M22 44 q12 -6 24 -2 L52 50 q-14 10 -14 26 q-16 2 -22 -8 q-4 -14 6 -24 Z" fill={color} />
      <path d="M24 47 L52 41" stroke={color} strokeWidth="9" strokeLinecap="round" />
    </svg>
  );
}

/* ---- shared storage: same keys the storefront uses ---- */
async function loadKey(key, fallback) {
  try { const r = await window.storage.get(key, true); return r ? JSON.parse(r.value) : fallback; }
  catch { return fallback; }
}
async function saveKey(key, val) {
  try { await window.storage.set(key, JSON.stringify(val), true); return true; }
  catch (e) { console.error("save failed", key, e); return false; }
}

/* ---- photo upload: resize + compress to keep storage light ---- */
function compressImage(file, maxW = 640, quality = 0.72) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, maxW / img.width);
        const canvas = document.createElement("canvas");
        canvas.width = Math.round(img.width * scale);
        canvas.height = Math.round(img.height * scale);
        canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function AdminApp() {
  const [core, setCore] = useState(null); // {products, slots, settings}
  const [orders, setOrders] = useState([]);
  const [authed, setAuthed] = useState(false);
  const [pin, setPin] = useState("");
  const [tab, setTab] = useState("dash");
  const [lastSync, setLastSync] = useState(null);
  const [saving, setSaving] = useState(false);
  const seenCount = useRef(0);
  const [newOrders, setNewOrders] = useState(0);

  const refresh = async (silent) => {
    const c = await loadKey("huntandeat-core", null);
    const o = await loadKey("huntandeat-orders", []);
    if (c) setCore(c);
    setOrders(o);
    setLastSync(new Date());
    if (silent && seenCount.current && o.length > seenCount.current) setNewOrders(o.length - seenCount.current);
    seenCount.current = o.length;
  };

  useEffect(() => {
    refresh(false);
    const t = setInterval(() => refresh(true), 10000); // auto-connect: poll every 10s
    return () => clearInterval(t);
  }, []);

  const saveCore = async (patch) => {
    setSaving(true);
    const next = { ...core, ...patch };
    setCore(next);
    await saveKey("huntandeat-core", next);
    setSaving(false);
  };
  const saveOrders = async (next) => {
    setOrders(next);
    await saveKey("huntandeat-orders", next);
    seenCount.current = next.length;
  };

  const settings = core?.settings || { adminPin: "1234" };
  const products = core?.products || [];
  const slots = core?.slots || [];

  if (!authed) {
    return (
      <Shell>
        <div style={{ minHeight: "100vh", display: "grid", placeItems: "center", background: BRAND.redDark }}>
          <div style={{ background: "#fff", borderRadius: 16, padding: 28, width: 320, textAlign: "center" }}>
            <div style={{ display: "grid", placeItems: "center" }}><Logo size={64} /></div>
            <h2 className="display" style={{ fontWeight: 800, margin: "6px 0 2px" }}>Hunt & Eat Admin</h2>
            <div style={{ fontSize: 9, letterSpacing: 2.5, fontWeight: 700, color: BRAND.red, marginBottom: 8 }}>THE FRESH AND ORIGINAL</div>
            <p style={{ fontSize: 13, color: "#8a857a", margin: "0 0 14px" }}>Enter your 4-digit admin PIN</p>
            <input type="password" maxLength={4} value={pin} onChange={(e) => setPin(e.target.value)}
              onKeyDown={(e) => e.key === "Enter" && (pin === settings.adminPin ? setAuthed(true) : setPin(""))}
              style={{ ...inp, textAlign: "center", fontSize: 22, letterSpacing: 8 }} placeholder="••••" />
            <button onClick={() => (pin === settings.adminPin ? setAuthed(true) : setPin(""))}
              style={{ width: "100%", marginTop: 12, background: BRAND.red, color: "#fff", border: "none", borderRadius: 10, padding: 12, fontWeight: 700, cursor: "pointer" }}>Unlock</button>
            <p style={{ fontSize: 11, color: "#a39e93", marginTop: 12 }}>This dashboard link is for staff only.<br />Never share it on customer channels.</p>
          </div>
        </div>
      </Shell>
    );
  }

  const today = new Date().toISOString().slice(0, 10);
  const active = orders.filter((o) => o.status !== "Cancelled");
  const todays = active.filter((o) => o.slotDate === today);
  const pending = active.filter((o) => o.status !== "Delivered");
  const revenue = active.filter((o) => o.status === "Delivered").reduce((s, o) => s + o.total, 0);
  const todayRevenue = todays.reduce((s, o) => s + o.total, 0);

  const tabs = [["dash", "📊 Dashboard"], ["orders", `📦 Orders${newOrders ? ` (+${newOrders} new)` : ""}`], ["menu", "🍗 Menu"], ["slots", "🕐 Slots"], ["settings", "⚙️ Settings"]];

  return (
    <Shell>
      <header style={{ background: BRAND.redDark, color: "#fff", padding: "12px 16px", display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8 }}>
        <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
          <div style={{ background: BRAND.cream, borderRadius: 8, padding: 3, display: "grid", placeItems: "center" }}><Logo size={26} /></div>
          <span className="display" style={{ fontWeight: 800, fontSize: 17 }}>Hunt & Eat — Admin Dashboard</span>
        </div>
        <div style={{ fontSize: 12, display: "flex", gap: 10, alignItems: "center" }}>
          <span style={{ opacity: 0.8 }}>{saving ? "Saving…" : lastSync ? `Synced ${lastSync.toLocaleTimeString("en-IN", { hour: "2-digit", minute: "2-digit", second: "2-digit" })}` : "Connecting…"}</span>
          <button onClick={() => { refresh(false); setNewOrders(0); }} style={{ background: BRAND.cream, color: BRAND.redDark, border: "none", borderRadius: 8, padding: "6px 12px", fontWeight: 700, cursor: "pointer", fontSize: 12 }}>↻ Sync now</button>
        </div>
      </header>
      <div style={{ background: "#fff", borderBottom: "1px solid #e5dfd0", display: "flex", overflowX: "auto" }}>
        {tabs.map(([id, l]) => (
          <button key={id} onClick={() => { setTab(id); if (id === "orders") setNewOrders(0); }}
            style={{ flex: "0 0 auto", background: "none", border: "none", borderBottom: "3px solid " + (tab === id ? BRAND.red : "transparent"), padding: "12px 18px", fontWeight: 700, fontSize: 13, cursor: "pointer", color: tab === id ? BRAND.red : "#6b675e" }}>{l}</button>
        ))}
      </div>
      <main style={{ maxWidth: 1000, margin: "0 auto", padding: 16 }}>
        {!core && <div style={{ background: "#FFF6E5", border: "1px solid #EAD9A8", borderRadius: 10, padding: 14, fontSize: 13, marginBottom: 14 }}>No store data found yet. Open the Hunt & Eat store app once — it will publish the default catalog, and this dashboard will pick it up automatically.</div>}
        {tab === "dash" && (
          <>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(180px,1fr))", gap: 12, marginBottom: 20 }}>
              <Stat l="Today's orders" v={todays.length} sub={rup(todayRevenue)} />
              <Stat l="Pending orders" v={pending.length} sub="need action" hot={pending.length > 0} />
              <Stat l="Delivered revenue" v={rup(revenue)} sub="all time" />
              <Stat l="Total orders" v={orders.length} sub={`${orders.length - active.length} cancelled`} />
            </div>
            <h3 className="display" style={{ fontWeight: 800, fontSize: 17 }}>Today's slot load</h3>
            <div style={{ display: "grid", gap: 8 }}>
              {slots.map((s) => {
                const n = active.filter((o) => o.slotDate === today && o.slotId === s.id).length;
                return (
                  <div key={s.id} style={{ background: "#fff", borderRadius: 10, padding: "10px 14px", display: "flex", justifyContent: "space-between", fontSize: 14 }}>
                    <span style={{ fontWeight: 600 }}>{s.label}</span>
                    <span style={{ color: n >= s.capacity ? BRAND.danger : BRAND.ok, fontWeight: 700 }}>{n} / {s.capacity}</span>
                  </div>
                );
              })}
            </div>
          </>
        )}
        {tab === "orders" && <Orders orders={orders} saveOrders={saveOrders} />}
        {tab === "menu" && <Menu products={products} save={(p) => saveCore({ products: p })} />}
        {tab === "slots" && <Slots slots={slots} save={(s) => saveCore({ slots: s })} />}
        {tab === "settings" && <Settings settings={settings} save={(s) => saveCore({ settings: s })} />}
      </main>
    </Shell>
  );
}

function Shell({ children }) {
  return (
    <div style={{ minHeight: "100vh", background: BRAND.bg, fontFamily: "'Inter','Segoe UI',system-ui,sans-serif", color: BRAND.ink }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Inter:wght@400;500;600;700&display=swap');
        .display { font-family: 'Playfair Display', Georgia, serif; }
        ::-webkit-scrollbar { height: 6px; width: 8px; }
        ::-webkit-scrollbar-thumb { background: #d8d2c4; border-radius: 4px; }
      `}</style>
      {children}
    </div>
  );
}

const Stat = ({ l, v, sub, hot }) => (
  <div style={{ background: "#fff", borderRadius: 12, padding: 16, borderLeft: "4px solid " + (hot ? BRAND.danger : BRAND.red) }}>
    <div style={{ fontSize: 12, color: "#8a857a", fontWeight: 600 }}>{l}</div>
    <div className="display" style={{ fontSize: 24, fontWeight: 800 }}>{v}</div>
    <div style={{ fontSize: 12, color: "#8a857a" }}>{sub}</div>
  </div>
);

function Modal({ close, children }) {
  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(122,21,32,.5)", zIndex: 60, display: "grid", placeItems: "center", padding: 16 }} onClick={close}>
      <div onClick={(e) => e.stopPropagation()} style={{ background: "#fff", borderRadius: 16, width: "min(460px,100%)", maxHeight: "90vh", overflowY: "auto", padding: 20, boxSizing: "border-box", position: "relative" }}>
        <button onClick={close} style={{ position: "absolute", top: 10, right: 10, background: "#f0ece1", border: "none", borderRadius: 999, width: 30, height: 30, cursor: "pointer", fontWeight: 700 }}>✕</button>
        {children}
      </div>
    </div>
  );
}

/* ---------------- Orders ---------------- */
function Orders({ orders, saveOrders }) {
  const [filter, setFilter] = useState("pending");
  const list = orders.filter((o) => filter === "all" ? true : filter === "pending" ? (o.status !== "Delivered" && o.status !== "Cancelled") : o.status === filter);
  const setStatus = (id, status) => saveOrders(orders.map((o) => (o.id === id ? { ...o, status } : o)));
  return (
    <>
      <div style={{ display: "flex", gap: 6, marginBottom: 14, flexWrap: "wrap" }}>
        {["pending", "all", ...STATUSES, "Cancelled"].map((f) => (
          <button key={f} onClick={() => setFilter(f)} style={{ background: filter === f ? BRAND.red : "#fff", color: filter === f ? "#fff" : BRAND.ink, border: "1px solid #e5dfd0", borderRadius: 999, padding: "5px 12px", fontSize: 12, fontWeight: 600, cursor: "pointer" }}>{f}</button>
        ))}
      </div>
      {list.length === 0 && <div style={{ textAlign: "center", color: "#8a857a", padding: 30 }}>No orders here. New orders from the store appear automatically within ~10 seconds.</div>}
      <div style={{ display: "grid", gap: 10 }}>
        {list.map((o) => (
          <div key={o.id} style={{ background: "#fff", borderRadius: 12, padding: 14 }}>
            <div style={{ display: "flex", justifyContent: "space-between", flexWrap: "wrap", gap: 6 }}>
              <div>
                <span className="display" style={{ fontWeight: 800 }}>{o.id}</span>
                <span style={{ fontSize: 12, color: "#8a857a", marginLeft: 8 }}>{o.slotDate} · {o.slotLabel}</span>
              </div>
              <b>{rup(o.total)}</b>
            </div>
            <div style={{ fontSize: 13, color: "#5c584e", margin: "4px 0" }}>
              👤 {o.name} · 📞 {o.phone} · 📍 {o.address}, {o.pincode} · {o.pay === "cod" ? "💵 COD" : "📱 UPI"}
            </div>
            <div style={{ fontSize: 13, margin: "4px 0 8px" }}>{o.items.map((i) => `${i.name} ×${i.qty}`).join(" · ")}</div>
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center" }}>
              <select value={o.status} onChange={(e) => setStatus(o.id, e.target.value)} style={{ ...inp, width: "auto", padding: "7px 10px", fontSize: 13, fontWeight: 600 }}>
                {[...STATUSES, "Cancelled"].map((s) => <option key={s}>{s}</option>)}
              </select>
              <span style={{ fontSize: 12, fontWeight: 700, color: o.status === "Delivered" ? BRAND.ok : o.status === "Cancelled" ? BRAND.danger : "#B07A1A" }}>● {o.status}</span>
              <a href={`https://wa.me/91${(o.phone || "").replace(/\D/g, "").slice(-10)}?text=${encodeURIComponent(`Hunt & Eat 🐓 Order ${o.id}: ${o.status}. Total ${rup(o.total)} · Slot ${o.slotLabel}. Thank you!`)}`}
                target="_blank" rel="noreferrer"
                style={{ marginLeft: "auto", background: "#1FA855", color: "#fff", borderRadius: 8, padding: "7px 12px", fontSize: 12, fontWeight: 700, textDecoration: "none" }}>
                WhatsApp customer
              </a>
            </div>
          </div>
        ))}
      </div>
    </>
  );
}

/* ---------------- Menu (with photo upload) ---------------- */
function Menu({ products, save }) {
  const empty = { id: "", cat: "chicken", name: "", pcs: "", gross: "—", net: "—", mrp: "", price: "", stock: true, emoji: "🍗", desc: "", img: "" };
  const [edit, setEdit] = useState(null);
  const [uploading, setUploading] = useState(false);
  const fileRef = useRef(null);

  const onFile = async (file) => {
    if (!file || !file.type.startsWith("image/")) return;
    setUploading(true);
    try {
      const dataUrl = await compressImage(file);
      setEdit((e) => ({ ...e, img: dataUrl }));
    } catch { alert("Couldn't read that image. Try a JPG or PNG."); }
    setUploading(false);
  };

  const saveProduct = () => {
    if (!edit.name || !edit.price) return;
    const p = { ...edit, mrp: Number(edit.mrp || edit.price), price: Number(edit.price) };
    if (p.id) save(products.map((x) => (x.id === p.id ? p : x)));
    else save([...products, { ...p, id: "p" + Date.now() }]);
    setEdit(null);
  };

  return (
    <>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14, flexWrap: "wrap", gap: 8 }}>
        <p style={{ fontSize: 13, color: "#6b675e", margin: 0 }}>Changes here go live on the customer store on their next visit or refresh.</p>
        <button onClick={() => setEdit(empty)} style={{ background: BRAND.red, color: "#fff", border: "none", borderRadius: 10, padding: "10px 18px", fontWeight: 700, cursor: "pointer" }}>+ Add item</button>
      </div>
      <div style={{ display: "grid", gap: 8 }}>
        {products.map((p) => (
          <div key={p.id} style={{ background: "#fff", borderRadius: 10, padding: "10px 14px", display: "flex", alignItems: "center", gap: 12, flexWrap: "wrap" }}>
            <div style={{ width: 48, height: 48, borderRadius: 8, overflow: "hidden", flexShrink: 0, background: BRAND.creamSoft, display: "grid", placeItems: "center", fontSize: 24 }}>
              {p.img ? <img src={p.img} alt="" style={{ width: "100%", height: "100%", objectFit: "cover" }} /> : p.emoji}
            </div>
            <div style={{ flex: 1, minWidth: 160 }}>
              <div style={{ fontWeight: 600, fontSize: 14 }}>{p.name}</div>
              <div style={{ fontSize: 12, color: "#8a857a" }}>{p.cat} · {rup(p.price)} <s style={{ opacity: .6 }}>{rup(p.mrp)}</s> {p.img ? "· 📷 photo set" : "· no photo"}</div>
            </div>
            <label style={{ fontSize: 12, fontWeight: 600, display: "flex", gap: 5, alignItems: "center", cursor: "pointer" }}>
              <input type="checkbox" checked={p.stock} onChange={() => save(products.map((x) => x.id === p.id ? { ...x, stock: !x.stock } : x))} /> In stock
            </label>
            <button onClick={() => setEdit(p)} style={{ background: "#f0ece1", border: "none", borderRadius: 8, padding: "6px 12px", cursor: "pointer", fontSize: 12, fontWeight: 700 }}>Edit</button>
            <button onClick={() => window.confirm(`Delete "${p.name}"?`) && save(products.filter((x) => x.id !== p.id))} style={{ background: "#fbe9e7", color: BRAND.danger, border: "none", borderRadius: 8, padding: "6px 12px", cursor: "pointer", fontSize: 12, fontWeight: 700 }}>Delete</button>
          </div>
        ))}
      </div>

      {edit && (
        <Modal close={() => setEdit(null)}>
          <h3 className="display" style={{ fontWeight: 800, margin: "0 0 12px" }}>{edit.id ? "Edit menu item" : "New menu item"}</h3>

          {/* photo upload */}
          <div
            onDragOver={(e) => e.preventDefault()}
            onDrop={(e) => { e.preventDefault(); onFile(e.dataTransfer.files[0]); }}
            onClick={() => fileRef.current?.click()}
            style={{ border: "2px dashed " + BRAND.red, borderRadius: 12, padding: 12, textAlign: "center", cursor: "pointer", marginBottom: 10, background: "#FDF7F1" }}>
            {edit.img ? (
              <img src={edit.img} alt="preview" style={{ width: "100%", maxHeight: 160, objectFit: "cover", borderRadius: 8 }} />
            ) : (
              <div style={{ color: BRAND.red, fontWeight: 700, fontSize: 13, padding: "14px 0" }}>
                📷 {uploading ? "Processing photo…" : "Tap to upload a photo (or drag & drop)"}
                <div style={{ fontWeight: 500, color: "#8a857a", fontSize: 12, marginTop: 4 }}>Photos are auto-resized so the store stays fast</div>
              </div>
            )}
            <input ref={fileRef} type="file" accept="image/*" style={{ display: "none" }} onChange={(e) => onFile(e.target.files[0])} />
          </div>
          {edit.img && (
            <div style={{ display: "flex", gap: 8, marginBottom: 10 }}>
              <button onClick={() => fileRef.current?.click()} style={{ flex: 1, background: "#f0ece1", border: "none", borderRadius: 8, padding: 8, fontWeight: 700, fontSize: 12, cursor: "pointer" }}>Replace photo</button>
              <button onClick={() => setEdit({ ...edit, img: "" })} style={{ flex: 1, background: "#fbe9e7", color: BRAND.danger, border: "none", borderRadius: 8, padding: 8, fontWeight: 700, fontSize: 12, cursor: "pointer" }}>Remove photo</button>
            </div>
          )}

          <div style={{ display: "grid", gap: 8 }}>
            <input style={inp} placeholder="Item name" value={edit.name} onChange={(e) => setEdit({ ...edit, name: e.target.value })} />
            <select style={inp} value={edit.cat} onChange={(e) => setEdit({ ...edit, cat: e.target.value })}>
              {CATEGORIES.map((c) => <option key={c.id} value={c.id}>{c.name}</option>)}
            </select>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
              <input style={inp} placeholder="Selling price ₹" type="number" value={edit.price} onChange={(e) => setEdit({ ...edit, price: e.target.value })} />
              <input style={inp} placeholder="MRP ₹" type="number" value={edit.mrp} onChange={(e) => setEdit({ ...edit, mrp: e.target.value })} />
              <input style={inp} placeholder="Pieces (e.g. 12–14 Pcs)" value={edit.pcs} onChange={(e) => setEdit({ ...edit, pcs: e.target.value })} />
              <input style={inp} placeholder="Fallback emoji" value={edit.emoji} onChange={(e) => setEdit({ ...edit, emoji: e.target.value })} />
              <input style={inp} placeholder="Gross weight" value={edit.gross} onChange={(e) => setEdit({ ...edit, gross: e.target.value })} />
              <input style={inp} placeholder="Net weight" value={edit.net} onChange={(e) => setEdit({ ...edit, net: e.target.value })} />
            </div>
            <input style={inp} placeholder="Or paste an image URL" value={(edit.img || "").startsWith("data:") ? "" : edit.img} onChange={(e) => setEdit({ ...edit, img: e.target.value })} />
            <textarea style={{ ...inp, resize: "vertical" }} rows={2} placeholder="Short description" value={edit.desc} onChange={(e) => setEdit({ ...edit, desc: e.target.value })} />
            <button onClick={saveProduct} style={{ background: BRAND.red, color: "#fff", border: "none", borderRadius: 10, padding: 12, fontWeight: 700, cursor: "pointer" }}>Save & publish to store</button>
          </div>
        </Modal>
      )}
    </>
  );
}

/* ---------------- Slots ---------------- */
function Slots({ slots, save }) {
  const upd = (id, patch) => save(slots.map((s) => (s.id === id ? { ...s, ...patch } : s)));
  return (
    <>
      <p style={{ fontSize: 13, color: "#6b675e" }}>Same-day slots auto-close before the slot starts (cut-off set in Settings). Toggle a slot off to hide it from customers.</p>
      <div style={{ display: "grid", gap: 8 }}>
        {slots.map((s) => (
          <div key={s.id} style={{ background: "#fff", borderRadius: 10, padding: "12px 14px", display: "flex", alignItems: "center", gap: 14, flexWrap: "wrap" }}>
            <b style={{ flex: 1, minWidth: 150 }}>🕐 {s.label}</b>
            <label style={{ fontSize: 13, display: "flex", gap: 6, alignItems: "center" }}>
              Capacity
              <input type="number" min={1} value={s.capacity} onChange={(e) => upd(s.id, { capacity: Number(e.target.value) || 1 })} style={{ ...inp, width: 70, padding: "6px 8px" }} />
            </label>
            <label style={{ fontSize: 13, fontWeight: 700, display: "flex", gap: 6, alignItems: "center", cursor: "pointer", color: s.active ? BRAND.ok : BRAND.danger }}>
              <input type="checkbox" checked={s.active} onChange={() => upd(s.id, { active: !s.active })} />
              {s.active ? "Active" : "Paused"}
            </label>
            <button onClick={() => window.confirm("Remove this slot?") && save(slots.filter((x) => x.id !== s.id))} style={{ background: "#fbe9e7", color: BRAND.danger, border: "none", borderRadius: 8, padding: "6px 12px", cursor: "pointer", fontSize: 12, fontWeight: 700 }}>Remove</button>
          </div>
        ))}
      </div>
      <button onClick={() => {
        const label = prompt("Slot label (e.g. 8:00 PM – 10:00 PM)");
        const start = Number(prompt("Start hour, 24h format (e.g. 20)"));
        if (label && !isNaN(start)) save([...slots, { id: "s" + Date.now(), label, start, capacity: 10, active: true }]);
      }} style={{ marginTop: 12, background: BRAND.red, color: "#fff", border: "none", borderRadius: 10, padding: "10px 18px", fontWeight: 700, cursor: "pointer" }}>+ Add slot</button>
    </>
  );
}

/* ---------------- Settings ---------------- */
function Settings({ settings, save }) {
  const [f, setF] = useState(settings);
  const [saved, setSaved] = useState(false);
  useEffect(() => setF(settings), [settings]);
  const Field = ({ l, children }) => (
    <label style={{ display: "grid", gap: 4, fontSize: 13, fontWeight: 600 }}>{l}{children}</label>
  );
  return (
    <div style={{ maxWidth: 480, display: "grid", gap: 10 }}>
      <Field l="Delivery fee (₹)"><input style={inp} type="number" value={f.deliveryFee} onChange={(e) => setF({ ...f, deliveryFee: Number(e.target.value) })} /></Field>
      <Field l="Free delivery above (₹)"><input style={inp} type="number" value={f.freeAbove} onChange={(e) => setF({ ...f, freeAbove: Number(e.target.value) })} /></Field>
      <Field l="Serviceable pincodes (comma separated)"><input style={inp} value={f.pincodes} onChange={(e) => setF({ ...f, pincodes: e.target.value })} /></Field>
      <Field l="Store phone"><input style={inp} value={f.phone} onChange={(e) => setF({ ...f, phone: e.target.value })} /></Field>
      <Field l="Same-day slot cut-off (hours before slot)"><input style={inp} type="number" value={f.cutoffHours} onChange={(e) => setF({ ...f, cutoffHours: Number(e.target.value) })} /></Field>
      <Field l="Admin PIN"><input style={inp} value={f.adminPin} onChange={(e) => setF({ ...f, adminPin: e.target.value })} /></Field>
      <button onClick={() => { save(f); setSaved(true); setTimeout(() => setSaved(false), 1500); }} style={{ background: BRAND.red, color: "#fff", border: "none", borderRadius: 10, padding: 12, fontWeight: 700, cursor: "pointer" }}>
        {saved ? "✓ Saved & published" : "Save settings"}
      </button>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<AdminApp />);
</script>
</body>
</html>
