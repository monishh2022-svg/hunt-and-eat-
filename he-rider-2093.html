async function loadOrders() {
  const r = await fetch(RTDB + "/huntandeat/huntandeat-orders.json");
  if (!r.ok) throw new Error("read failed");
  const v = await r.json();
  return v ? JSON.parse(v) : [];
}
async function saveOrders(list) {
  const r = await fetch(RTDB + "/huntandeat/huntandeat-orders.json", { method: "PUT", body: JSON.stringify(JSON.stringify(list)) });
  if (!r.ok) throw new Error("write failed");
}

function App() {
  const [phone, setPhone] = useState(() => { try { return localStorage.getItem("he-rider") || ""; } catch { return ""; } });
  const [entered, setEntered] = useState(() => { try { return !!localStorage.getItem("he-rider"); } catch { return false; } });
  const [orders, setOrders] = useState([]);
  const [last, setLast] = useState(null);
  const [err, setErr] = useState("");

  const refresh = async () => {
    try { setOrders(await loadOrders()); setLast(new Date()); setErr(""); }
    catch { setErr("Can't reach the database — check internet."); }
  };
  useEffect(() => {
    if (!entered) return;
    refresh();
    const t = setInterval(refresh, 12000);
    return () => clearInterval(t);
  }, [entered]);

  const digits = phone.replace(/\D/g, "").slice(-10);
  const mine = orders.filter((o) => ((o.rider || "").replace(/\D/g, "")).includes(digits) && digits.length === 10);
  const active = mine.filter((o) => o.status !== "Delivered" && o.status !== "Cancelled");
  const doneToday = mine.filter((o) => o.status === "Delivered" && o.slotDate === dkey(new Date()));
  const cashToday = doneToday.filter((o) => o.pay === "cod").reduce((s, o) => s + o.total, 0);

  const setStatus = async (id, status) => {
    try {
      const latest = await loadOrders();
      await saveOrders(latest.map((o) => (o.id === id ? { ...o, status } : o)));
      refresh();
    } catch { alert("Couldn't update — check internet and try again."); }
  };

  if (!entered) {
    return (
      <div style={{ minHeight: "100vh", display: "grid", placeItems: "center", background: BRAND.redDark, padding: 16 }}>
        <div style={{ background: "#fff", borderRadius: 16, padding: 26, width: "min(340px,100%)", textAlign: "center", boxSizing: "border-box" }}>
          <img src={LOGO_SRC} width="72" height="72" style={{ objectFit: "contain", borderRadius: 14 }} alt="" />
          <h2 className="display" style={{ fontWeight: 800, margin: "8px 0 2px" }}>Hunt &amp; Eat Rider</h2>
          <div style={{ fontSize: 9, letterSpacing: 2.5, fontWeight: 700, color: BRAND.red, marginBottom: 12 }}>DELIVERY PARTNER APP</div>
          <p style={{ fontSize: 13, color: "#8a857a", margin: "0 0 12px" }}>Enter your mobile number — the same one the shop assigned your orders to.</p>
          <input value={phone} onChange={(e) => setPhone(e.target.value)} placeholder="10-digit mobile number" inputMode="numeric"
            style={{ width: "100%", padding: "12px 14px", borderRadius: 10, border: "1.5px solid #e5dfd0", fontSize: 16, textAlign: "center", boxSizing: "border-box", outline: "none" }} />
          <button onClick={() => { if (digits.length === 10) { try { localStorage.setItem("he-rider", digits); } catch {} setEntered(true); } }}
            style={{ width: "100%", marginTop: 12, background: BRAND.red, color: "#fff", border: "none", borderRadius: 10, padding: 13, fontWeight: 800, fontSize: 15, cursor: "pointer" }}>
            Start deliveries →
          </button>
        </div>
      </div>
    );
  }

  return (
    <div style={{ minHeight: "100vh", background: "#F4F0E6", fontFamily: "'Nunito',sans-serif", color: BRAND.ink }}>
      <header style={{ background: BRAND.redDark, color: "#fff", padding: "12px 14px", display: "flex", alignItems: "center", gap: 10, position: "sticky", top: 0, zIndex: 10 }}>
        <img src={LOGO_SRC} width="34" height="34" style={{ objectFit: "contain", borderRadius: 8, background: BRAND.cream }} alt="" />
        <div style={{ flex: 1 }}>
          <div className="display" style={{ fontWeight: 800, fontSize: 16, lineHeight: 1 }}>Rider — {digits}</div>
          <div style={{ fontSize: 10.5, opacity: 0.8 }}>{last ? "Updated " + last.toLocaleTimeString("en-IN", { hour: "2-digit", minute: "2-digit" }) : "Connecting…"} · auto-refreshes</div>
        </div>
        <button onClick={refresh} style={{ background: BRAND.cream, color: BRAND.redDark, border: "none", borderRadius: 8, padding: "7px 12px", fontWeight: 800, fontSize: 12, cursor: "pointer" }}>↻</button>
        <button onClick={() => { try { localStorage.removeItem("he-rider"); } catch {} setEntered(false); }}
          style={{ background: "transparent", color: "#F3DCC0", border: "1px solid rgba(255,255,255,.35)", borderRadius: 8, padding: "7px 10px", fontSize: 11, fontWeight: 700, cursor: "pointer" }}>Exit</button>
      </header>

      <main style={{ maxWidth: 560, margin: "0 auto", padding: 14 }}>
        {err && <div style={{ background: "#FBE9E7", color: BRAND.red, borderRadius: 10, padding: 10, fontSize: 13, fontWeight: 700, marginBottom: 10 }}>{err}</div>}
        <div style={{ display: "flex", gap: 10, marginBottom: 14 }}>
          <div style={{ flex: 1, background: "#fff", borderRadius: 12, padding: "10px 14px", borderLeft: "4px solid " + BRAND.red }}>
            <div style={{ fontSize: 11, color: "#8a857a", fontWeight: 700 }}>TO DELIVER</div>
            <div className="display" style={{ fontSize: 22, fontWeight: 800 }}>{active.length}</div>
          </div>
          <div style={{ flex: 1, background: "#fff", borderRadius: 12, padding: "10px 14px", borderLeft: "4px solid " + BRAND.ok }}>
            <div style={{ fontSize: 11, color: "#8a857a", fontWeight: 700 }}>DONE TODAY</div>
            <div className="display" style={{ fontSize: 22, fontWeight: 800 }}>{doneToday.length}</div>
          </div>
          <div style={{ flex: 1.4, background: "#fff", borderRadius: 12, padding: "10px 14px", borderLeft: "4px solid #B98A2E" }}>
            <div style={{ fontSize: 11, color: "#8a857a", fontWeight: 700 }}>CASH COLLECTED</div>
            <div className="display" style={{ fontSize: 22, fontWeight: 800 }}>{rup(cashToday)}</div>
          </div>
        </div>

        {digits.length === 10 && active.length === 0 && (
          <div style={{ textAlign: "center", color: "#8a857a", padding: "40px 10px", fontSize: 14 }}>
            No deliveries assigned to your number yet.<br />New orders appear here automatically when the shop assigns them to {digits}.
          </div>
        )}

        {active.map((o) => {
          const maps = o.loc ? `https://www.google.com/maps?q=${o.loc.lat},${o.loc.lng}` : `https://www.google.com/maps/search/${encodeURIComponent(o.address + " " + o.pincode)}`;
          const out = o.status === "Out for delivery";
          return (
            <div key={o.id} style={{ background: "#fff", borderRadius: 14, padding: 14, marginBottom: 12, boxShadow: "0 3px 12px rgba(94,15,24,.08)" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 6 }}>
                <span className="display" style={{ fontWeight: 800, fontSize: 17 }}>{o.id}</span>
                <span style={{ background: o.pay === "cod" ? "#FDF1DC" : "#E8F2FD", color: o.pay === "cod" ? "#8E6A1F" : "#1a56a8", borderRadius: 8, padding: "4px 10px", fontSize: 12.5, fontWeight: 800 }}>
                  {o.pay === "cod" ? "COLLECT " + rup(o.total) + " CASH" : "UPI ON DELIVERY · " + rup(o.total)}
                </span>
              </div>
              <div style={{ fontSize: 12.5, color: "#8a857a", margin: "2px 0 6px" }}>🕐 {o.slotDate} · {o.slotLabel} · <b style={{ color: out ? "#B07A1A" : BRAND.red }}>{o.status}</b></div>
              <div style={{ fontSize: 13.5, margin: "0 0 6px" }}>{o.items.map((i) => `${i.qty}× ${i.name}`).join(" · ")}</div>
              <div style={{ fontSize: 13.5, fontWeight: 700 }}>👤 {o.name}</div>
              <div style={{ fontSize: 13, color: "#5c584e", marginBottom: 10 }}>📍 {o.address}, {o.pincode}</div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 8 }}>
                <a href={"tel:+91" + (o.phone || "").replace(/\D/g, "").slice(-10)} style={{ background: "#241E1A", color: "#fff", borderRadius: 10, padding: "11px 0", textAlign: "center", fontWeight: 800, fontSize: 14, textDecoration: "none" }}>📞 Call</a>
                <a href={maps} target="_blank" rel="noreferrer" style={{ background: "#1a73e8", color: "#fff", borderRadius: 10, padding: "11px 0", textAlign: "center", fontWeight: 800, fontSize: 14, textDecoration: "none" }}>🗺️ Navigate</a>
              </div>
              {!out ? (
                <button onClick={() => setStatus(o.id, "Out for delivery")}
                  style={{ width: "100%", background: BRAND.red, color: "#fff", border: "none", borderRadius: 10, padding: 13, fontWeight: 800, fontSize: 15, cursor: "pointer" }}>
                  🛵 Start delivery
                </button>
              ) : (
                <button onClick={() => window.confirm("Mark " + o.id + " as Delivered?") && setStatus(o.id, "Delivered")}
                  style={{ width: "100%", background: BRAND.ok, color: "#fff", border: "none", borderRadius: 10, padding: 13, fontWeight: 800, fontSize: 15, cursor: "pointer" }}>
                  ✅ Mark Delivered
                </button>
              )}
            </div>
          );
        })}
      </main>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
